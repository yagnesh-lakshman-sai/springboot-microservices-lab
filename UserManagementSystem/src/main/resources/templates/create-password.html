<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Create Password</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

	<div class="container mt-5">

		<div class="card">

			<div class="card-header">

				<h3>Create Password</h3>

			</div>

			<div class="card-body">

				<form th:action="@{/create-password}" th:object="${createPasswordRequest}" method="post">

					<input type="hidden" th:field="*{token}">

					<div class="mb-3">

						<label>New Password</label>

						<input type="password" class="form-control" th:field="*{password}">

						<div class="text-danger" th:errors="*{password}">
						</div>

					</div>

					<div class="mb-3">

						<label>Confirm Password</label>

						<input type="password" class="form-control" th:field="*{confirmPassword}">

						<div class="text-danger" th:errors="*{confirmPassword}">
						</div>

					</div>

					<button type="submit" class="btn btn-primary">

						Save Password

					</button>

				</form>

			</div>

		</div>

	</div>

</body>

</html>
