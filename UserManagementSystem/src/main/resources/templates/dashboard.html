<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Dashboard</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

	<div class="container mt-5">

		<h2>Welcome</h2>

		<hr>

		<table class="table table-bordered">

			<tr>
				<td>First Name</td>
				<td th:text="${profile.firstName}"></td>
			</tr>

			<tr>
				<td>Last Name</td>
				<td th:text="${profile.lastName}"></td>
			</tr>

			<tr>
				<td>Email</td>
				<td th:text="${profile.email}"></td>
			</tr>

			<tr>
				<td>Phone</td>
				<td th:text="${profile.phone}"></td>
			</tr>

			<tr>
				<td>Gender</td>
				<td th:text="${profile.gender}"></td>
			</tr>

			<tr>
				<td>Date Of Birth</td>
				<td th:text="${profile.dob}"></td>
			</tr>

		</table>

		<a th:href="@{/profile/edit}" class="btn btn-primary">

			Edit Profile

		</a>

		<a th:href="@{/logout}" class="btn btn-danger">

			Logout

		</a>

	</div>

</body>

</html>
