<form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">

	<div class="mb-3">

		<label>Email</label>

		<input type="email" class="form-control" th:field="*{email}">

		<div class="text-danger" th:errors="*{email}">
		</div>

	</div>

	<button class="btn btn-primary">

		Send Reset Link

	</button>

</form>

<div class="alert alert-success mt-3" th:if="${msg}" th:text="${msg}">
</div>
